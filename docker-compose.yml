services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: mealplanner
      POSTGRES_USER: mealplanner
      POSTGRES_PASSWORD: mealplanner
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mealplanner -d mealplanner']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=mealplanner;Username=mealplanner;Password=mealplanner
      JWT_ISSUER: http://localhost:${API_PORT:-5000}
      JWT_AUDIENCE: meal-planner-local
      JWT_SECRET: local-development-jwt-secret-1234567890
      JWT_EXPIRY_DAYS: 7
    ports:
      - '${API_PORT:-5000}:8080'
    healthcheck:
      test: ['CMD', 'curl', '--fail', 'http://127.0.0.1:8080/health']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres-data:
