<ion-header translucent="true">
  <ion-toolbar>
    <ion-title>{{ page.title }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content fullscreen="true">
  <div class="shell-page">
    <section class="shell-card">
      <p class="eyebrow">{{ page.eyebrow }}</p>
      <h1>{{ page.headline }}</h1>
      <p class="description">{{ page.description }}</p>
    </section>
  </div>
</ion-content>
